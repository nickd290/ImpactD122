# Railway Nixpacks configuration
# Specify Node 20 to satisfy package requirements

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# Vite + TS live in client/server devDependencies — production-omit installs drop them
# and break `vite build` (sh: vite: not found). Force full install for build tools.
cmds = ["NPM_CONFIG_PRODUCTION=false npm install --include=dev"]

[phases.build]
cmds = [
  "npx prisma generate --schema=./server/prisma/schema.prisma",
  # tsc has noEmitOnError:false — emit succeeds; exit non-zero on type warnings is ignored if dist exists
  "npm run build --workspace=server",
  "npm run build --workspace=client"
]
